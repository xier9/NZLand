<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Auckland Airport International terminal ground floor map notes</title>
  <desc id="desc">Simplified map note showing One NZ at position 5 and Air NZ Domestic Transfers at positions 14 and 15.</desc>
  <rect width="1200" height="760" fill="#fffdf8"/>
  <rect x="54" y="54" width="1092" height="652" rx="18" fill="#f7f5ef" stroke="#1d2521" stroke-width="6"/>
  <rect x="110" y="150" width="980" height="420" rx="14" fill="#ffffff" stroke="#ded8c9" stroke-width="4"/>
  <path d="M155 484h884" stroke="#b8c5be" stroke-width="14" stroke-linecap="round" stroke-dasharray="1 28"/>
  <path d="M158 356h372M672 356h366" stroke="#b8c5be" stroke-width="14" stroke-linecap="round" stroke-dasharray="1 28"/>
  <rect x="142" y="606" width="205" height="54" rx="8" fill="#0f5132"/>
  <text x="244" y="640" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif" font-size="24" font-weight="800" fill="#fff">入口 / 出口</text>
  <text x="600" y="104" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif" font-size="34" font-weight="900" fill="#1d2521">International terminal · Ground floor</text>
  <text x="600" y="134" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif" font-size="20" font-weight="700" fill="#64706a">重點位置：One NZ 5；Domestic Transfers 14、15</text>
  <g>
    <circle cx="914" cy="278" r="48" fill="#dff1f5" stroke="#155e75" stroke-width="5"/>
    <text x="914" y="291" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif" font-size="40" font-weight="900" fill="#155e75">5</text>
    <rect x="770" y="338" width="288" height="78" rx="12" fill="#eaf7f9" stroke="#155e75" stroke-width="3"/>
    <text x="914" y="370" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif" font-size="26" font-weight="900" fill="#155e75">One NZ</text>
    <text x="914" y="398" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif" font-size="18" font-weight="700" fill="#155e75">SIM / mobile shop</text>
  </g>
  <g>
    <circle cx="452" cy="500" r="46" fill="#fff0cf" stroke="#8a4b00" stroke-width="5"/>
    <text x="452" y="513" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif" font-size="38" font-weight="900" fill="#8a4b00">14</text>
    <circle cx="560" cy="500" r="46" fill="#fff0cf" stroke="#8a4b00" stroke-width="5"/>
    <text x="560" y="513" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif" font-size="38" font-weight="900" fill="#8a4b00">15</text>
    <rect x="318" y="570" width="380" height="78" rx="12" fill="#fff7df" stroke="#8a4b00" stroke-width="3"/>
    <text x="508" y="602" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif" font-size="25" font-weight="900" fill="#8a4b00">Air NZ Domestic Transfers</text>
    <text x="508" y="630" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif" font-size="18" font-weight="700" fill="#8a4b00">5am-9am / from 9am</text>
  </g>
  <g>
    <rect x="138" y="194" width="290" height="98" rx="12" fill="#eef5f0" stroke="#0f5132" stroke-width="3"/>
    <text x="283" y="231" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif" font-size="25" font-weight="900" fill="#0f5132">Arrivals route</text>
    <text x="283" y="262" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif" font-size="18" font-weight="700" fill="#0f5132">入境、領行李、海關檢查</text>
  </g>
  <path d="M434 256c105 9 218 20 342 48" fill="none" stroke="#0f5132" stroke-width="8" stroke-linecap="round" stroke-dasharray="18 18"/>
  <path d="M682 450c-46 29-82 44-122 50" fill="none" stroke="#8a4b00" stroke-width="8" stroke-linecap="round" stroke-dasharray="18 18"/>
  <text x="600" y="695" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif" font-size="19" font-weight="700" fill="#64706a">簡化示意圖，現場仍以 Auckland Airport 官方 PDF 與航廈指標為準。</text>
</svg>

<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f5132" />
    <title>New Zealand 自駕行程</title>
    <link rel="manifest" href="./manifest.webmanifest?v=decrypt-only-v10" />
    <link rel="stylesheet" href="./styles.css?v=decrypt-only-v10" />
  </head>
  <body>
    <section id="authGate" class="auth-gate" aria-label="行程密碼">
      <form id="authForm" class="auth-card">
        <p class="eyebrow">Private Trip App</p>
        <h2>輸入密碼</h2>
        <p>請輸入兩組密碼；登入成功後才會解鎖行程內容。</p>
        <label>
          <span>第一組密碼</span>
          <input id="tripPasswordPrimary" type="password" autocomplete="current-password" required />
        </label>
        <label>
          <span>第二組密碼</span>
          <input id="tripPasswordSecondary" type="password" autocomplete="current-password" required />
        </label>
        <p id="authError" class="auth-error" role="alert"></p>
        <button type="submit">進入行程</button>
      </form>
    </section>

    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">South Island Road Trip</p>
          <h1>紐西蘭自駕行程</h1>
          <p id="tripStatus" class="trip-status">讀取行程中...</p>
        </div>
        <div class="top-actions">
          <button id="lockApp" class="text-button" type="button">鎖定</button>
          <button id="installHelp" class="icon-button" type="button" aria-label="加入主畫面說明" title="加入主畫面">
            +
          </button>
        </div>
      </header>

      <main>
        <section class="control-panel" aria-label="行程控制">
          <div class="quick-actions">
            <button class="mode-button is-active" data-mode="current" type="button">目前 Day</button>
            <button class="mode-button" data-mode="next" type="button">下一 Day</button>
            <button class="mode-button" data-mode="all" type="button">全部</button>
          </div>
          <label class="search-box">
            <span>搜尋</span>
            <input id="searchInput" type="search" placeholder="景點、餐廳、地址、提醒..." autocomplete="off" />
          </label>
          <div id="dayTabs" class="day-tabs" aria-label="依日期切換"></div>
        </section>

        <section id="summaryAlerts" class="summary-alerts" aria-label="重要提醒"></section>

        <section id="itineraryView" class="itinerary-view" aria-live="polite"></section>
      </main>
    </div>

    <dialog id="installDialog">
      <form method="dialog" class="dialog-card">
        <h2>加入 iPhone/iPad 主畫面</h2>
        <p>用 Safari 開啟這個網址，點分享按鈕，再選「加入主畫面」。出發前每台裝置打開一次，核心行程會快取在本機。</p>
        <button type="submit">知道了</button>
      </form>
    </dialog>

    <script src="./data.encrypted.js?v=decrypt-only-v10"></script>
    <script src="./app.js?v=decrypt-only-v10"></script>
  </body>
</html>
